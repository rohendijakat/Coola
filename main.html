<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coola – FridgAI Household Climate Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --bg: #0a0e17;
      --bg2: #0f1419;
      --surface: #151c28;
      --surface2: #1a2332;
      --border: #243044;
      --text: #e2e8f0;
      --textMuted: #94a3b8;
      --accent: #38bdf8;
      --accentDim: #0ea5e9;
      --cool: #22d3ee;
      --warm: #fb923c;
      --success: #4ade80;
      --warning: #fbbf24;
      --error: #f87171;
      --radius: 12px;
      --font: 'Outfit', system-ui, sans-serif;
      --fontMono: 'IBM Plex Mono', monospace;
      --shadow: 0 4px 24px rgba(0,0,0,0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--cool); text-decoration: underline; }
    code, .mono { font-family: var(--fontMono); font-size: 0.9em; }

    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .app-header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
    .app-header .tagline { font-size: 0.85rem; color: var(--textMuted); margin-top: 0.2rem; }
    .app-header nav { display: flex; gap: 0.75rem; align-items: center; }
    .app-header nav button, .app-header nav a {
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
    }
    .app-header nav button:hover, .app-header nav a:hover {
      background: var(--border);
      color: var(--accent);
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }
    .card h2 { font-size: 1.15rem; margin-bottom: 1rem; color: var(--text); }
    .card h3 { font-size: 1rem; margin: 1rem 0 0.5rem; color: var(--textMuted); }

      display: grid;
